<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特許文書の検索システム</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }
        main {
            max-width: 800px;
            margin: 0 auto;
        }
        div {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        a {
            font-size: 1.5em;
            color: #007BFF;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        p {
            margin-top: 10px;
            color: #555;
        }
        p .description {
            text-indent: 1em;
        }
    </style>
</head>
<body>
    <main>
        <div>
            <a href="/joker" target="_blank">
                全文検索
            </a>
            <p class="description">
                特許文書を検索します。
            </p>
        </div>
        <div>
            <a href="/skull" target="_blank">
                メタデータ編集
            </a>
            <p class="description">
                特許文書に担当者などを付加できます。
            </p>
        </div>
        <div>
            <a href="/navi" target="_blank">
                管理画面
            </a>
            <p class="description">
                特許文書の収集、登録を行います。
            </p>
        </div>
    </main>
</body>

</html>
