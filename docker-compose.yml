services:
  crow:
    container_name: crow
    image: ghcr.io/hyperion13th144m/phantom-crow@sha256:71b56fdd26f515fc73c500b30f10363318e87c2b45ba69fc126214aab1b840f0
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_CROW: /var/log/crow
      NAVI_ORCHESTRATION_WEBHOOK_URL: ${NAVI_ORCHESTRATION_WEBHOOK_URL:-}
      NAVI_ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS: ${NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS:-5}
    volumes:
      - ${SRC_DIR}:/src-dir
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_CROW}:/var/log/crow

  mona:
    container_name: mona
    image: ghcr.io/hyperion13th144m/phantom-mona@sha256:754186cf244b804a9c51f16b3c2a6956cd834f9e4adb32ba6739a02007d2e7a9
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_MONA: /var/log/mona
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_MONA}:/var/log/mona
   
  navi:
    container_name: navi
    image: ghcr.io/hyperion13th144m/phantom-navi@sha256:ebeb8d23ccfcec3383b8ecb2f59e96780a15d5c923ea29e59d233aca66058d49
    environment:
      CROW_URL: http://crow:8000
      PANTHER_URL: http://panther:8000
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      LOG_DIR_NAVI: /var/log/navi
    volumes:
      - ${LOG_DIR_NAVI}:/var/log/navi


  panther:
    container_name: panther
    image: ghcr.io/hyperion13th144m/phantom-panther@sha256:687aa7f59e01d961890f5a9c6057066ecdc2f9a076a3accae3c98853e4873a56
    environment:
      MONA_URL: http://mona:8000
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_PANTHER: /var/log/panther
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther

  fox:
    container_name: fox
    image: ghcr.io/hyperion13th144m/phantom-fox@sha256:f8d31d229a008b58bbbfc6d9339bf598016b8bcfd63438a627317b37d68238f4
    environment:
      NODE_ENV: production
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox

  joker:
    container_name: joker
    image: ghcr.io/hyperion13th144m/phantom-joker@sha256:590819e019696ca482554490230225b688a86fa6b07fd21c7277655a1952a0f0
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
    depends_on:
      - es

  skull:
    container_name: skull
    image: ghcr.io/hyperion13th144m/phantom-skull:main
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      NEXT_PUBLIC_APP_URL: http://skull:3000/skull
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
    volumes:
      - ${LOG_DIR_SKULL}:/var/log/skull
      - ${EXTRA_DATA_DIR}:/extra-dir

  es:
    image: ghcr.io/hyperion13th144m/phantom-elasticsearch@sha256:a829572348d6f57cd436c9f185c352841fc4b20f9675dc9602fe9652395accd7
    container_name: phantom-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: always

  nginx:
    container_name: phantom-nginx
    image: nginx:1.29.6-alpine
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./infra/nginx/index.html:/usr/share/nginx/html/index.html
    ports:
      - ${NGINX_PORT}:8080
    depends_on:
      - joker
      - fox
      - skull
      - mona
      - navi

volumes:
  es-data:
