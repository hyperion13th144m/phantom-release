services:
  crow:
    container_name: crow
    image: ghcr.io/hyperion13th144m/phantom-crow@sha256:c32b74203a8a2a7849d497a3a9ec75360b6495a5e042ac1127a30c9e1bdb9bc0
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_CROW: /var/log/crow
      NAVI_ORCHESTRATION_WEBHOOK_URL: ${NAVI_ORCHESTRATION_WEBHOOK_URL:-}
      NAVI_ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS: ${NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS:-5}
    volumes:
      - ${SRC_DIR}:/src-dir
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_CROW}:/var/log/crow

  mona:
    container_name: mona
    image: ghcr.io/hyperion13th144m/phantom-mona@sha256:0191e0c07698209d3c08f8049fa0e1225602d8de61773928c6431847009f9001
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_MONA: /var/log/mona
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_MONA}:/var/log/mona
   
  navi:
    container_name: navi
    image: ghcr.io/hyperion13th144m/phantom-navi@sha256:310ab40bb1cc7fb9cddd2eacd96c891e9f46de6bc1ee0a858c535c7585dd2dfb
    environment:
      CROW_URL: http://crow:8000
      PANTHER_URL: http://panther:8000
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      LOG_DIR_NAVI: /var/log/navi
    volumes:
      - ${LOG_DIR_NAVI}:/var/log/navi


  panther:
    container_name: panther
    image: ghcr.io/hyperion13th144m/phantom-panther@sha256:3696789366ee6664cacb2e5b84054987048c180efe6362b0ea820699b8f21715
    environment:
      MONA_URL: http://mona:8000
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_PANTHER: /var/log/panther
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther

  fox:
    container_name: fox
    image: ghcr.io/hyperion13th144m/phantom-fox@sha256:3121fe0d0303e558a917ff9e779144f40bcfe81878677ebd9dc98c55807fba85
    environment:
      NODE_ENV: production
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox

  joker:
    container_name: joker
    image: ghcr.io/hyperion13th144m/phantom-joker@sha256:e3e26d23e1c77ddfb16a6859bbec57480b48d24fefb422055b3d3ad6ee10d58e
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
    depends_on:
      - es

  skull:
    container_name: skull
    image: ghcr.io/hyperion13th144m/phantom-skull@sha256:d384af87dba64359289d21ee498dc276cc8d873a59f02e7ce762d1e79f678454
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      NEXT_PUBLIC_APP_URL: http://skull:3000/skull
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
    volumes:
      - ${LOG_DIR_SKULL}:/var/log/skull
      - ${EXTRA_DATA_DIR}:/extra-dir

  es:
    image: ghcr.io/hyperion13th144m/phantom-elasticsearch@sha256:b0eaf570962a2420f8340c64e6507b1f265160b3b8f5411b73e38dc517a057f9
    container_name: phantom-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: always

  nginx:
    container_name: phantom-nginx
    image: nginx:1.29.6-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/index.html:/usr/share/nginx/html/index.html
    ports:
      - ${NGINX_PORT}:8080
    depends_on:
      - joker
      - fox
      - skull
      - mona
      - navi

volumes:
  es-data:
