services:
  crow:
    container_name: crow
    image: ghcr.io/hyperion13th144m/phantom-crow@sha256:5dcf5e86c318f1d0b54a485dad3ff8223a3aeb879aab04ce18ba90eaf610150a
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_CROW: /var/log/crow
      NAVI_ORCHESTRATION_WEBHOOK_URL: ${NAVI_ORCHESTRATION_WEBHOOK_URL:-http://navi:8000/orchestration/crow-completed}
      NAVI_ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS: ${NAVI_ORCHESTRATION_WEBHOOK_TIMEOUT_SECONDS:-5}
    volumes:
      - ${SRC_DIR}:/src-dir
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_CROW}:/var/log/crow

  mona:
    container_name: mona
    image: ghcr.io/hyperion13th144m/phantom-mona@sha256:06289724bac402168e715f36cc38db3a4436e03a0e7c3632bed18aba71d94b2b
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_MONA: /var/log/mona
      NAVI_ORCHESTRATION_URL: ${NAVI_ORCHESTRATION_URL:-http://navi:8000/orchestration}
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      DATA_DIR: /data-dir
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_MONA}:/var/log/mona
   
  navi:
    container_name: navi
    image: ghcr.io/hyperion13th144m/phantom-navi@sha256:5e0e0b5d6c39c9461c06f7b42f86bea5de8cf89380a8941654eb8026f758364f
    environment:
      CROW_URL: http://crow:8000
      PANTHER_URL: http://panther:8000
      MONA_URL: http://mona:8000
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
      LOG_DIR_NAVI: /var/log/navi
    volumes:
      - ${LOG_DIR_NAVI}:/var/log/navi


  panther:
    container_name: panther
    image: ghcr.io/hyperion13th144m/phantom-panther@sha256:d9ac99fa6be566d0a6fd820c0e97f62cb65400a932c34bb8cabcd998e5b32f52
    environment:
      MONA_URL: http://mona:8000
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      LOG_DIR_PANTHER: /var/log/panther
      NAVI_ORCHESTRATION_URL: ${NAVI_ORCHESTRATION_URL:-http://navi:8000/orchestration}
      ORCHESTRATION_WEBHOOK_SECRET: ${ORCHESTRATION_WEBHOOK_SECRET:-}
    volumes:
      - ${DATA_DIR}:/data-dir
      - ${LOG_DIR_PANTHER}:/var/log/panther

  fox:
    container_name: fox
    image: ghcr.io/hyperion13th144m/phantom-fox@sha256:f79949bf0a4db23f90aad13b9bf1a34e2025137016cbd97ca22a14120864799c
    environment:
      NODE_ENV: production
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_FOX}:/var/log/fox

  joker:
    container_name: joker
    image: ghcr.io/hyperion13th144m/phantom-joker@sha256:e3e26d23e1c77ddfb16a6859bbec57480b48d24fefb422055b3d3ad6ee10d58e
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      MONA_URL: http://mona:8000
    volumes:
      - ${LOG_DIR_JOKER}:/var/log/joker
    depends_on:
      - es

  skull:
    container_name: skull
    image: ghcr.io/hyperion13th144m/phantom-skull@sha256:d384af87dba64359289d21ee498dc276cc8d873a59f02e7ce762d1e79f678454
    environment:
      LANG: ja_JP.UTF-8
      TZ: Asia/Tokyo
      ES_URL: http://es:9200
      ES_USER: ${ES_USER}
      ES_PASSWORD: ${ES_PASSWORD}
      ES_INDEX: ${ES_INDEX}
      NEXT_PUBLIC_DOCUMENT_BASE_URL: /fox/docs
      NEXT_PUBLIC_APP_URL: http://skull:3000/skull
      SQLITE_PATH: /extra-dir/${SQLITE_NAME}
    volumes:
      - ${LOG_DIR_SKULL}:/var/log/skull
      - ${EXTRA_DATA_DIR}:/extra-dir

  es:
    image: ghcr.io/hyperion13th144m/phantom-elasticsearch@sha256:b0eaf570962a2420f8340c64e6507b1f265160b3b8f5411b73e38dc517a057f9
    container_name: phantom-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      network.host: 0.0.0.0
      ELASTIC_PASSWORD: ${ES_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es-data:/usr/share/elasticsearch/data
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    container_name: phantom-nginx
    image: nginx:1.29.6-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/index.html:/usr/share/nginx/html/index.html
    ports:
      - ${NGINX_PORT}:8080
    depends_on:
      - joker
      - fox
      - skull
      - mona
      - navi

  es-init:
    image: curlimages/curl:8.7.1
    container_name: phantom-es-init
    depends_on:
      es:
        condition: service_healthy
    volumes:
      - ./es:/mappings:ro
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        set -eu

        ES_URL="http://es:9200"
        INDEX_NAME="${ES_INDEX:-patent-documents}"
        MAPPING_FILE="/mappings/mapping.json"

        echo "Waiting for Elasticsearch..."
        until curl -fsS "$ES_URL/_cluster/health?wait_for_status=yellow&timeout=1s" >/dev/null; do
          sleep 2
        done

        if curl -fsS "$ES_URL/$INDEX_NAME" >/dev/null 2>&1; then
          echo "Index already exists: $INDEX_NAME"
          exit 0
        fi

        echo "Creating index: $INDEX_NAME"
        curl -fsS -X PUT "$ES_URL/$INDEX_NAME" \
          -H "Content-Type: application/json" \
          --data-binary "@$MAPPING_FILE"

        echo "Index created."

volumes:
  es-data:
